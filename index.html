<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Relink 电竞</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            background: #ffffff;
            overflow: hidden;
            font-family: "Microsoft YaHei", sans-serif;
        }

        .top-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            padding: 30px;
            background: linear-gradient(90deg, #ffd000, #ffec60);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .logo-wrap {
            position: relative;
        }

        .logo {
            font-size: 34px;
            font-weight: 900;
            color: #fff;
            -webkit-text-stroke: 2.5px #000;
            letter-spacing: 3px;
            white-space: nowrap;
            cursor: pointer;
        }

        .hover-tip {
            position: absolute;
            top: 110%;
            left: 0;
            font-size: 13px;
            color: #222;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }

        .logo-wrap:hover .hover-tip {
            opacity: 1;
        }

        .time-date {
            font-size: 18px;
            font-weight: bold;
            color: #000;
            letter-spacing: 1px;
        }

        .top-line {
            position: fixed;
            top: 90px;
            left: 0;
            width: 100vw;
            height: 2px;
            background: #000;
            z-index: 9;
        }

        .nav-menu {
            position: fixed;
            top: 92px;
            left: 0;
            display: flex;
            padding: 0 30px;
            gap: 60px;
            height: 50px;
            align-items: center;
            z-index: 8;
            background: #fff;
            width: 100vw;
        }

        .nav-item {
            font-size: 18px;
            color: #333;
            font-weight: bold;
            cursor: pointer;
            position: relative;
            padding: 5px 0;
        }

        .nav-item::after {
            content: "";
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, #ffd000, #ffec60);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .nav-item.active::after {
            opacity: 1;
        }

        .content {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px;
            font-weight: bold;
            text-align: center;
            line-height: 2.2;
            display: none;
            max-width: 800px;
        }
        .content.show {
            display: block;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0,0,0,0.6);
            z-index: 999;
            display: none;
            justify-content: center;
            align-items: center;
        }

        .modal {
            width: 400px;
            background: #fff;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 20px rgba(0,0,0,0.3);
            position: relative;
        }

        .modal-title {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 20px;
        }

        .tab-group {
            display: flex;
            margin-bottom: 20px;
            border-bottom: 1px solid #eee;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .tab.active {
            color: #ffd000;
            border-bottom: 2px solid #ffd000;
        }

        .form-item {
            margin-bottom: 15px;
        }

        .form-item label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            font-weight: bold;
        }

        .form-item input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(90deg, #ffd000, #ffec60);
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            font-size: 20px;
            cursor: pointer;
            color: #666;
        }

        .form-panel {
            display: none;
        }

        .form-panel.active {
            display: block;
        }

        .tip-text {
            font-size: 12px;
            color: red;
            margin-top: 5px;
            display: none;
        }

        .user-list {
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
            border-top: 1px solid #eee;
            padding-top: 10px;
            font-size: 12px;
        }

        .user-item {
            padding: 5px 0;
            border-bottom: 1px solid #f5f5f5;
        }
    </style>
</head>

<body>
    <div class="top-gradient">
        <div class="logo-wrap">
            <div class="logo" id="textArea">Relink 电竞</div>
            <div class="hover-tip">点击切换中英文</div>
        </div>
        <div class="time-date" id="clock"></div>
    </div>

    <div class="top-line"></div>

    <div class="nav-menu">
        <div class="nav-item active" data-page="home">主页</div>
        <div class="nav-item" data-page="order">点单</div>
        <div class="nav-item" data-page="rule">规定</div>
        <div class="nav-item" data-page="login" id="loginBtn">登录</div>
        <div class="nav-item" data-page="about">关于</div>
    </div>

    <div class="content" id="content"></div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <span class="close-btn" id="closeModal">×</span>
            <div class="modal-title">请登录/注册</div>
            
            <div class="tab-group">
                <div class="tab active" data-panel="login">登录</div>
                <div class="tab" data-panel="register">注册</div>
            </div>

            <div class="form-panel active" id="loginPanel">
                <div class="form-item">
                    <label>用户名</label>
                    <input type="text" id="loginUser" placeholder="请输入用户名">
                </div>
                <div class="form-item">
                    <label>密码</label>
                    <input type="password" id="loginPwd" placeholder="请输入密码">
                </div>
                <div class="tip-text" id="loginTip">用户名或密码错误</div>
                <button class="btn" id="submitLogin">登录</button>
                <div class="user-list" id="adminUserList" style="display:none;"></div>
            </div>

            <div class="form-panel" id="registerPanel">
                <div class="form-item">
                    <label>邮箱/手机号</label>
                    <input type="text" id="regContact" placeholder="请输入邮箱或手机号">
                </div>
                <div class="form-item">
                    <label>用户名</label>
                    <input type="text" id="regUser" placeholder="请输入用户名">
                </div>
                <div class="form-item">
                    <label>密码</label>
                    <input type="password" id="regPwd" placeholder="请输入密码">
                </div>
                <div class="form-item">
                    <label>确认密码</label>
                    <input type="password" id="regPwd2" placeholder="请再次输入密码">
                </div>
                <div class="tip-text" id="regTip">密码不一致</div>
                <button class="btn" id="submitRegister">注册</button>
            </div>
        </div>
    </div>

    <script>
        const chineseText = "Relink 电竞";
        const englishText = "Relink Esports";
        const textEle = document.getElementById("textArea");
        const content = document.getElementById("content");
        let isChinese = true;
        let isLogin = false;
        textEle.innerText = chineseText;

        textEle.addEventListener("click", () => {
            isChinese = !isChinese;
            textEle.innerText = isChinese ? chineseText : englishText;
        });

        function updateTime() {
            const now = new Date();
            const y = now.getFullYear();
            const m = String(now.getMonth() + 1).padStart(2, '0');
            const d = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0');
            const mi = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock').innerText = `${y}-${m}-${d} ${h}:${mi}:${s}`;
        }
        updateTime();
        setInterval(updateTime, 1000);

        const navItems = document.querySelectorAll(".nav-item");
        const loginBtn = document.getElementById("loginBtn");
        const modalOverlay = document.getElementById("modalOverlay");

        navItems.forEach(item => {
            item.addEventListener("click", () => {
                navItems.forEach(el => el.classList.remove("active"));
                item.classList.add("active");
                const page = item.dataset.page;

                content.classList.add("show");
                if (page === "home" || page === "order") {
                    content.innerText = isLogin ? "此页面正在维护中" : "对不起，请先登录再查看";
                } else if (page === "rule") {
                    if(!isLogin){
                        content.innerText = "对不起，请先登录再查看";
                    }else{
                        content.innerHTML = `
1.打手双倒算炸单，这把不算，还要打（疾风干员开大自救不算）。<br>
2.打手没有达到保底不能结单，老板举报可以补单<br>
3.老板可以养鼠鼠，但是如果见面不打暗号不鼠来不开大的大部分是老鼠，不能养
                        `;
                    }
                } else if (page === "about") {
                    content.innerHTML = `
管理员：赵诗远 王睿涵 高维俊<br>
Relink 电竞<br>
2026-4创建<br>
联系方式：3923500604@qq.com 1784496760@qq.com chinadreamteam@163.com 微信:13050130614
                    `;
                } else if (page === "login") {
                    modalOverlay.style.display = "flex";
                    content.classList.remove("show");
                }
            });
        });

        window.onload = () => {
            content.innerText = "对不起，请先登录再查看";
            content.classList.add("show");
        };

        function initUsers() {
            if(!localStorage.getItem("users")) {
                const users = [
                    { role: "admin", username: "admin", password: "131010", contact: "管理员" }
                ];
                localStorage.setItem("users", JSON.stringify(users));
            }
        }
        initUsers();

        function getUsers() {
            return JSON.parse(localStorage.getItem("users")) || [];
        }

        function saveUser(user) {
            const users = getUsers();
            users.push(user);
            localStorage.setItem("users", JSON.stringify(users));
        }

        const tabs = document.querySelectorAll(".tab");
        const panels = document.querySelectorAll(".form-panel");
        tabs.forEach(tab => {
            tab.addEventListener("click", () => {
                tabs.forEach(t => t.classList.remove("active"));
                panels.forEach(p => p.classList.remove("active"));
                document.getElementById(`${tab.dataset.panel}Panel`).classList.add("active");
                tab.classList.add("active");
            });
        });

        document.getElementById("closeModal").addEventListener("click", () => {
            modalOverlay.style.display = "none";
            document.getElementById("loginTip").style.display = "none";
            document.getElementById("regTip").style.display = "none";
        });

        document.getElementById("submitRegister").addEventListener("click", () => {
            const contact = document.getElementById("regContact").value.trim();
            const username = document.getElementById("regUser").value.trim();
            const pwd = document.getElementById("regPwd").value.trim();
            const pwd2 = document.getElementById("regPwd2").value.trim();
            const tip = document.getElementById("regTip");

            if(!contact || !username || !pwd || !pwd2) {
                tip.innerText = "请填写完整信息";
                tip.style.display = "block";
                return;
            }
            if(pwd !== pwd2) {
                tip.innerText = "两次密码不一致";
                tip.style.display = "block";
                return;
            }
            const users = getUsers();
            if(users.some(u => u.username === username)) {
                tip.innerText = "用户名已存在";
                tip.style.display = "block";
                return;
            }
            saveUser({role:"user",username,password:pwd,contact});
            alert("注册成功！");
            modalOverlay.style.display = "none";
        });

        document.getElementById("submitLogin").addEventListener("click", () => {
            const username = document.getElementById("loginUser").value.trim();
            const pwd = document.getElementById("loginPwd").value.trim();
            const tip = document.getElementById("loginTip");
            const userList = document.getElementById("adminUserList");
            const users = getUsers();
            const target = users.find(u => u.username === username && u.password === pwd);

            if(!target) {
                tip.style.display = "block";
                userList.style.display = "none";
                return;
            }
            tip.style.display = "none";
            modalOverlay.style.display = "none";
            loginBtn.innerText = username;
            isLogin = true;
            document.querySelector(".nav-item.active").click();
        });

        modalOverlay.addEventListener("click", (e) => {
            if(e.target === modalOverlay) modalOverlay.style.display = "none";
        });
    </script>
</body>
</html>
